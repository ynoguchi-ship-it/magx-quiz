<body class="bg-slate-900 text-slate-100 font-sans selection:bg-blue-500/30 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // スプレッドシート連携用URL（空欄の場合は内蔵データを使用）
    const SPREADSHEET_CSV_URL = ""; 

    const apiKey = "";

    const fetchGeminiExplanation = async (question, wrongOption, correctOption, explanation) => {
      const prompt = `あなたは製造業の新人教育を担当する優しいベテラン社員です。
新人が以下のクイズを間違えました。

【問題】${question}
【新人の回答(不正解)】${wrongOption}
【正解】${correctOption}
【元の解説】${explanation}

新人がなぜ間違えやすいのか（よくある誤解）、そして正解を現場の具体的なシチュエーションに例えて分かりやすく教えてください。
回答は簡潔に、親しみやすい言葉遣いでお願いします。`;

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: "あなたは製造業の優しいベテラン社員です。" }] }
      };

      const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));
      const retries = [1000, 2000, 4000, 8000, 16000];

      for (let i = 0; i < retries.length + 1; i++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          
          const data = await response.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "解説の生成に失敗しました。";
        } catch (error) {
          if (i < retries.length) {
            await delay(retries[i]);
          } else {
            return "通信エラーが発生しました。しばらく経ってから再度お試しください。";
          }
        }
      }
    };

    const QUIZ_CATEGORIES = [
      {
        id: 'comprehensive', name: '総合テスト（卒業試験）',
        icon: <i className="fa-solid fa-crown text-4xl text-yellow-400"></i>,
        theme: { borderHover: 'hover:border-yellow-500', shadowHover: 'hover:shadow-yellow-900/40', bgLight: 'bg-yellow-500/10', borderGroupHover: 'group-hover:border-yellow-500/50', text: 'text-yellow-400', bgBtn: 'bg-yellow-600', bgBtnHover: 'hover:bg-yellow-500', bgProgress: 'bg-yellow-500' },
        description: '全カテゴリからランダムに20問を出題します。現場で活躍するための総合力が試される卒業試験です！',
        isSpecial: true
      },
      {
        id: '5s', name: '5S・現場改善',
        icon: <i className="fa-solid fa-clipboard-list text-3xl text-blue-400"></i>,
        theme: { borderHover: 'hover:border-blue-500', shadowHover: 'hover:shadow-blue-900/20', bgLight: 'bg-blue-500/10', borderGroupHover: 'group-hover:border-blue-500/50', text: 'text-blue-400', bgBtn: 'bg-blue-600', bgBtnHover: 'hover:bg-blue-500', bgProgress: 'bg-blue-500' },
        description: '製造現場の基本となる5Sや、ムダ取り・カイゼンに関する知識をテストします。'
      },
      {
        id: 'qc', name: '品質管理 (QC)',
        icon: <i className="fa-solid fa-check-circle text-3xl text-emerald-400"></i>,
        theme: { borderHover: 'hover:border-emerald-500', shadowHover: 'hover:shadow-emerald-900/20', bgLight: 'bg-emerald-500/10', borderGroupHover: 'group-hover:border-emerald-500/50', text: 'text-emerald-400', bgBtn: 'bg-emerald-600', bgBtnHover: 'hover:bg-emerald-500', bgProgress: 'bg-emerald-500' },
        description: 'PDCAサイクルや品質を維持するための基本的な考え方について学びます。'
      },
      {
        id: 'safety', name: '安全衛生',
        icon: <i className="fa-solid fa-shield-halved text-3xl text-amber-400"></i>,
        theme: { borderHover: 'hover:border-amber-500', shadowHover: 'hover:shadow-amber-900/20', bgLight: 'bg-amber-500/10', borderGroupHover: 'group-hover:border-amber-500/50', text: 'text-amber-400', bgBtn: 'bg-amber-600', bgBtnHover: 'hover:bg-amber-500', bgProgress: 'bg-amber-500' },
        description: 'ハインリッヒの法則や危険予知など、労働災害を防ぐための知識を確認します。'
      },
      {
        id: 'maintenance', name: '設備保全',
        icon: <i className="fa-solid fa-wrench text-3xl text-cyan-400"></i>,
        theme: { borderHover: 'hover:border-cyan-500', shadowHover: 'hover:shadow-cyan-900/20', bgLight: 'bg-cyan-500/10', borderGroupHover: 'group-hover:border-cyan-500/50', text: 'text-cyan-400', bgBtn: 'bg-cyan-600', bgBtnHover: 'hover:bg-cyan-500', bgProgress: 'bg-cyan-500' },
        description: '設備の安定稼働に欠かせないTPM、予防保全、自主保全などの知識を学びます。'
      },
      {
        id: 'plastic_magnet', name: '製品知識 (プラマグ)',
        icon: <i className="fa-solid fa-magnet text-3xl text-purple-400"></i>,
        theme: { borderHover: 'hover:border-purple-500', shadowHover: 'hover:shadow-purple-900/20', bgLight: 'bg-purple-500/10', borderGroupHover: 'group-hover:border-purple-500/50', text: 'text-purple-400', bgBtn: 'bg-purple-600', bgBtnHover: 'hover:bg-purple-500', bgProgress: 'bg-purple-500' },
        description: '自社製品であるプラスチックマグネット（ボンド磁石）の構造、製法、特徴に関する基本知識を学びます。'
      }
    ];

    // 大幅増量したデフォルト（内蔵）クイズデータ
    const DEFAULT_QUIZ_QUESTIONS = {
      '5s': [
        { question: "5S活動における「整理」の正しい意味はどれですか？", options: ["必要なものと不要なものを分け、不要なものを捨てること", "必要なものをいつでもすぐに取り出せるように配置すること", "ゴミや汚れをなくし、綺麗な状態を保つこと", "決められたルールを正しく守る習慣をつけること"], answer: 0, explanation: "「整理」は要るものと要らないものを区別し、要らないものを捨てることです。選択肢2は「整頓」、3は「清掃」、4は「しつけ」です。" },
        { question: "トヨタ生産方式における「7つのムダ」に含まれないものはどれですか？", options: ["作りすぎのムダ", "在庫のムダ", "休憩のムダ", "動作のムダ"], answer: 2, explanation: "7つのムダは「作りすぎ、手持ち（待ち）、運搬、加工そのもの、在庫、動作、不良を作る」ムダです。適切な休憩はムダではありません。" },
        { question: "異常が発生した際に、作業者がラインを止め、異常を管理者に知らせるための表示盤を何と呼びますか？", options: ["カンバン", "アンドン", "ポカヨケ", "カイゼン"], answer: 1, explanation: "「アンドン（行灯）」は、異常発生時にランプを点灯させるなどして、周囲に状況を視覚的に知らせるシステムです。" },
        { question: "5Sの「整頓」を実践する際の基本となる考え方はどれですか？", options: ["見た目が美しければ、どこに置いてもよい", "3定（定位置・定品・定量）を守り、誰でもすぐに取り出せるようにする", "よく使うものは作業台の上にすべて出しっぱなしにする", "使わないものは工場の隅にまとめて置いておく"], answer: 1, explanation: "「整頓」は必要なものを必要な時にすぐに取り出せるようにすることです。「決められた場所に（定位置）、決められたものを（定品）、決められた量だけ（定量）」置く「3定」が重要です。" },
        { question: "日本の製造現場でよく使われる「カイゼン」の特徴として、最も適切なものはどれですか？", options: ["経営層からの一方的な指示で大規模な設備投資を行うこと", "現場の作業者が主体となり、日々の小さなムダを継続的になくしていくこと", "外部のコンサルタントにすべての問題解決を任せること", "年に1回だけ、工場全体を止めて大掃除をすること"], answer: 1, explanation: "現場発の「カイゼン」は、作業者自身が知恵を出し合い、継続的かつボトムアップで小さな改善を積み重ねていくのが特徴です。" },
        { question: "トヨタ生産方式の柱の一つである「ジャスト・イン・タイム（JIT）」の基本的な考え方はどれですか？", options: ["必要なものを、必要な時に、必要な量だけ造る", "とにかく早く、大量に造って在庫を確保する", "注文が入る前に、予測で限界まで造っておく", "時間が空いた時に、まとめて一気に造る"], answer: 0, explanation: "「必要なものを、必要な時に、必要な量だけ」供給することで、ムダ（特に在庫のムダ）を徹底的に排除する生産方式です。" },
        { question: "後工程が前工程へ、必要な部品や数量を指示するための情報伝達ツールを何と呼びますか？", options: ["アンドン", "ポカヨケ", "かんばん", "タクト"], answer: 2, explanation: "「かんばん」はジャスト・イン・タイムを実現するための道具です。スーパーで客が買った分だけ商品を補充する仕組みからヒントを得ました。" },
        { question: "1つの製品を生産するためにかけられる「基準となる時間」を何と呼びますか？", options: ["リードタイム", "タクトタイム", "サイクルタイム", "アイドルタイム"], answer: 1, explanation: "「タクトタイム」は、1日の稼働時間を1日の必要生産数で割ったものです。お客様の要望に合わせて「どのくらいのペースで作るべきか」を示す指標です。" },
        { question: "生産ラインにおいて、各工程の作業時間のばらつきをなくし、均等にすることを何と呼びますか？", options: ["ラインバランシング", "セル生産方式", "段取り替え", "多能工化"], answer: 0, explanation: "工程間の作業時間に差があると、遅い工程（ボトルネック）で滞留が発生し、早い工程では手待ちのムダが生じます。これを均等化するのがラインバランシングです。" },
        { question: "「段取り替え」の時間を短縮する手法として、「機械を止めて行う作業」と「機械を動かしたまま行う作業」を分ける考え方は？", options: ["内段取りと外段取りの分離", "シングル段取り", "ワンタッチ段取り", "ゼロ段取り"], answer: 0, explanation: "機械を止める必要がある「内段取り」を減らし、機械稼働中にできる「外段取り」へ移行することで、設備停止時間を最小限に抑えます。" },
        { question: "複数の異なる作業工程を一人でこなせるように育成された作業者を何と呼びますか？", options: ["単能工", "多能工", "熟練工", "派遣工"], answer: 1, explanation: "多能工化により、生産量の増減や欠勤への柔軟な対応、ラインバランスの最適化が可能になります。" },
        { question: "目で見て異常がすぐにわかるようにする管理手法を何と呼びますか？", options: ["見える化（目視管理）", "定点観測", "データ管理", "ブラックボックス化"], answer: 0, explanation: "メーターに正常範囲の色を塗る、置き場所の形を明示するなど、誰が見ても正常か異常かが一目でわかるようにする仕組みです。" },
        { question: "「標準作業」を構成する3つの要素として正しいものは？", options: ["スピード、正確性、安全性", "タクトタイム、作業順序、標準手持ち", "計画、実行、評価", "整理、整頓、清掃"], answer: 1, explanation: "標準作業は、「タクトタイム」「作業順序」「標準手持ち（作業をスムーズに行うための最小限の仕掛品）」の3要素から成り立ちます。" },
        { question: "設備のトラブル等で、一時的に設備が停止するが、簡単な処置ですぐに復旧するような短い停止を何と呼ぶ？", options: ["ドカ停", "チョコ停", "計画停止", "アイドリング"], answer: 1, explanation: "数秒から数分程度のわずかな停止を「チョコ停」と呼びます。これが頻発すると大きなロスになるため、原因究明と対策が必要です。" },
        { question: "作業者の疲労を減らし、効率を高めるための「動作経済の原則」に含まれないものは？", options: ["動作の数を減らす", "両手を同時に使う", "動作をできるだけ早く激しく行う", "動作の距離を短くする"], answer: 2, explanation: "動作経済の原則は、無理な動きやムダな動きをなくし、自然で楽な動作で作業できるようにするためのルールです。激しい動作は疲労に繋がります。" },
        { question: "動力（電気など）を使わず、重力やてこの原理などのからくりを利用して作業を改善する取り組みを何と呼ぶ？", options: ["IT化", "ロボット化", "からくり改善", "自動化"], answer: 2, explanation: "高額な設備投資を行わず、現場のアイデアと身の回りのもの（重力、バネ、滑車など）を使ってムダを省く、環境にも優しい改善手法です。" },
        { question: "ムダ取りの観点で、作業者が次の部品や指示が来るのを待っている状態を何と呼ぶ？", options: ["動作のムダ", "手持ち（待ち）のムダ", "不良のムダ", "加工のムダ"], answer: 1, explanation: "ラインバランスが悪い時や、前工程でトラブルがあった時などに発生する「手待ちのムダ」です。" },
        { question: "現場でのコミュニケーション不足が引き起こす問題として、最も不適切なものは？", options: ["連絡漏れによる不良品の発生", "作業の引き継ぎがスムーズにいく", "作業者のモチベーション低下", "ヒヤリハット報告の減少"], answer: 1, explanation: "コミュニケーションが不足すると、次工程への引き継ぎで伝達漏れが起きやすくなり、トラブルの原因となります。" },
        { question: "改善活動（カイゼン）を提案する際、「現状」をどう捉えるのが良いか？", options: ["現状が最も完璧だと信じる", "現状に問題はないかと常に疑いを持つ", "他人のやり方には口出ししない", "ルール通りにやっていればそれ以上は考えない"], answer: 1, explanation: "「もっと良くならないか？」「もっと楽にならないか？」と常に現状に疑問（問題意識）を持つことが、カイゼンの第一歩です。" },
        { question: "5Sの「清潔」を維持するための効果的な取り組みはどれか？", options: ["年に1回の大掃除に力を入れる", "整理・整頓・清掃のルール（基準）を決め、それを全員が守れる仕組みを作る", "汚れたらその都度、気づいた人だけが掃除する", "清掃用の道具を工場の端に隠しておく"], answer: 1, explanation: "「清潔」とは、整理・整頓・清掃が維持された状態のことです。個人の意識に頼るのではなく、仕組み化することが重要です。" },
        { question: "日々の作業改善において、「やめる」「減らす」「変える」などの観点から業務を見直す考え方を表す頭文字は？", options: ["PDCA", "ECRS（改善の4原則）", "KYT", "QC7"], answer: 1, explanation: "ECRS（イクルス）は、Eliminate（排除:やめる）、Combine（結合:一緒にやる）、Rearrange（交換:順序を変える）、Simplify（簡素化:簡単にする）の略で、改善の定石です。" },
        { question: "作業手順書（標準作業書）に関する記述で、間違っているものは？", options: ["新人を教育するための重要なツールである", "一度作成したら、絶対に書き換えてはいけない", "作業のバラツキをなくし、品質を安定させるためのものである", "安全に作業を行うためのポイントが記載されている"], answer: 1, explanation: "作業手順書は、現場の改善に合わせて常に最新の（より良い）状態にアップデートしていく「生きたマニュアル」でなければなりません。" }
      ],
      'qc': [
        { question: "業務改善の手法である「PDCAサイクル」。この『C』は何の略ですか？", options: ["Control（統制）", "Create（創造）", "Check（評価・点検）", "Communicate（伝達）"], answer: 2, explanation: "PDCAは Plan（計画）、Do（実行）、Check（評価・点検）、Action（改善）の頭文字です。実行した結果が計画通りか『Check』することが重要です。" },
        { question: "作業者の不注意やミスが発生しても、不良品を生み出さない、あるいは機械が自動的に停止する仕組みを何と呼びますか？", options: ["歩留まり", "ポカヨケ", "タクトタイム", "リードタイム"], answer: 1, explanation: "「ポカヨケ」は、うっかりミス（ポカ）を避ける（ヨケる）仕組みのことです。部品の向きを間違えるとセットできない形状にするなどが代表例です。" },
        { question: "品質管理において、データのばらつきを減らすために最も重要な考え方はどれですか？", options: ["検査の人数を倍に増やす", "作業者の勘と経験に頼る", "標準作業（マニュアル）を定め、それを遵守する", "不良品が出たら黙って捨てる"], answer: 2, explanation: "品質を安定させるには、誰がやっても同じ結果になるように「標準作業」を定め、それを厳密に守ることが大原則です。" },
        { question: "問題解決の基本姿勢である「三現主義」。現場・現物ともう一つは何ですか？", options: ["現状", "現行", "現実", "現金"], answer: 2, explanation: "三現主義は「現場に足を運び、現物を手に取り、現実（実際のデータや事実）を自分の目で見て確認する」という、問題解決において机上の空論を排除する重要な考え方です。" },
        { question: "QC7つ道具の一つで、結果（特性）とそれに影響を及ぼす原因との関係を系統的に整理した図を、その形から何と呼びますか？", options: ["クモの巣図", "魚の骨図（フィッシュボーン・チャート）", "ピラミッド図", "木の枝図（ツリー・チャート）"], answer: 1, explanation: "「特性要因図」のことで、形が魚の骨に似ていることから「魚の骨（フィッシュボーン）」とも呼ばれます。不良が発生した際、機械・材料・人・方法のどこに原因があるかを洗い出します。" },
        { question: "不良や欠点などの件数を原因別や現象別に分類し、件数の多い順に並べた棒グラフと、その累積割合の折れ線グラフを組み合わせた図は？", options: ["パレート図", "ヒストグラム", "散布図", "管理図"], answer: 0, explanation: "パレート図は「どの不良項目が最も影響が大きいか（重点的に対策すべきか）」を視覚的に把握するために使われます。" },
        { question: "製造業でよく使われる「歩留まり（ぶどまり）」という言葉の正しい意味はどれですか？", options: ["作業員が休憩を取らずに連続して働ける時間", "投入した原料に対して、実際に得られた良品の割合", "機械が故障して停止している時間の割合", "製品を顧客に届けるまでにかかる日数"], answer: 1, explanation: "歩留まりが高い（良品率が高い）ほど、材料のムダがなく効率よく生産できていることを示します。" },
        { question: "全社的な品質管理活動を指す「TQM」の『T』は何の略ですか？", options: ["Technology（技術的）", "Target（目標的）", "Total（総合的）", "Time（時間的）"], answer: 2, explanation: "TQMは Total Quality Management（総合的品質管理）の略です。製造部門だけでなく、営業や設計、間接部門を含めた全社員が参加して品質向上に取り組みます。" },
        { question: "工程が安定した状態で生産を続けた場合に、規格の範囲内に製品が収まる能力を示す指標は？", options: ["工程能力指数（Cp）", "不良率", "稼働率", "歩留まり"], answer: 0, explanation: "Cp（工程能力指数）は、工程のばらつきが規格幅に対してどれくらい余裕があるかを示します。一般的に1.33以上が良好とされます。" },
        { question: "製品やサービスの品質保証に関する国際規格はどれですか？", options: ["ISO 14001", "ISO 9001", "ISO 27001", "ISO 45001"], answer: 1, explanation: "ISO 9001は品質マネジメントシステム（QMS）の国際規格です。顧客満足と品質の継続的な改善を目指すための仕組みを規定しています。" },
        { question: "データを複数のグループ（層）に分け、それぞれの特徴を比較して問題の原因を探る手法は？", options: ["層別（そうべつ）", "チェックシート", "散布図", "ヒストグラム"], answer: 0, explanation: "「機械別」「作業者別」「時間帯別」などに層別することで、全体のデータでは見えなかった問題の傾向を把握しやすくなります。" },
        { question: "設計段階で、製品の故障モードとその影響を解析し、未然に防ぐための手法は？", options: ["FMEA", "FTA", "QCストーリー", "5W1H"], answer: 0, explanation: "FMEA（Failure Mode and Effects Analysis：故障モード影響解析）は、設計や工程で想定されるトラブルを抽出し、事前に対策を講じるための体系的な手法です。" },
        { question: "製品の品質に影響を与える「4M」。人（Man）、機械（Machine）、方法（Method）ともう一つは？", options: ["市場（Market）", "材料（Material）", "お金（Money）", "経営（Management）"], answer: 1, explanation: "不良が発生した際や、生産条件を変更する際は、この「4M」の観点で変動要素がないかを確認することが重要です。" },
        { question: "生産開始時の最初の製品（初品）に対して行う「初品検査」の最も重要な目的は？", options: ["その日のノルマを決めるため", "そのロット全体の不良発生を未然に防ぐため", "作業者の遅刻をチェックするため", "機械の掃除が終わったか確認するため"], answer: 1, explanation: "最初の製品が正しくできているかを確認することで、機械の設定ミスなどによる大量の不良品発生を防ぎます。" },
        { question: "現場で異常を発見した際にとるべき基本的な行動「ストップ・コール・ウェイト」の「ウェイト」とは？", options: ["機械の温度が下がるまで待つ", "勝手に判断せず、管理者の指示を待つ", "次の部品が来るまで待つ", "定時になるまで待つ"], answer: 1, explanation: "異常時には「止める（ストップ）」「呼ぶ（コール）」「待つ（ウェイト）」の徹底が、品質不良の流出や二次災害を防ぎます。" },
        { question: "職場のメンバーが小グループを編成し、自主的に問題解決や改善を行う活動を何と呼ぶ？", options: ["QCサークル活動", "労働組合活動", "レクリエーション", "5Sパトロール"], answer: 0, explanation: "現場の従業員が自主的にテーマを決め、QC手法を使って品質や業務の改善に取り組む小集団活動です。" },
        { question: "製造工程における「ロット（Lot）」の意味として正しいものは？", options: ["不良品を捨てるゴミ箱", "同じ条件で生産された製品のひとまとまり（単位）", "製品を出荷するトラック", "工場の敷地の広さ"], answer: 1, explanation: "「ロット番号」で管理することで、不良が発生した際に、どの時期・どの材料で作られた製品に影響があるかを追跡（トレーサビリティ）できるようになります。" },
        { question: "製品の検査において「抜き取り検査」が適しているケースはどれか？", options: ["人命に関わる重要な部品の検査", "全数検査をすると製品が破壊されてしまう場合（破壊検査）", "検査に全くコストがかからない場合", "不良率が極めて高く、すべて調べる必要がある場合"], answer: 1, explanation: "強度テストなど、製品を壊さないと検査できない場合は全数検査ができないため、統計的手法を用いた「抜き取り検査」が行われます。" },
        { question: "顧客からのクレームが発生した際、一番最初に行うべき対応はどれか？", options: ["責任者を決めて始末書を書かせる", "対象となるロットの製品の出荷を止め、被害の拡大を防ぐ（流出防止）", "原因がわかるまで顧客には連絡しない", "新しい生産ラインの設計を始める"], answer: 1, explanation: "品質異常発生時の鉄則です。まずは「疑わしいものをすべて止める（確保する）」ことで、それ以上の不良品が市場に出回るのを防ぐことが最優先です。" },
        { question: "品質データにおいて、「平均値（中心）」からどのくらいデータが散らばっているかを表す統計上の用語は？", options: ["中央値", "標準偏差（ばらつき/シグマ）", "最大値", "モード"], answer: 1, explanation: "データのばらつきの大きさを表すのが標準偏差（σ：シグマ）です。品質管理ではこのばらつきをいかに小さくするかが重要になります。" },
        { question: "ポカヨケの仕組みにおいて、異常が発生した際に機械を停止させる方式を「規制式」と呼びますが、異常をランプやブザーで作業者に知らせるだけの方式を何と呼ぶ？", options: ["注意式", "警報式", "警告式", "目視式"], answer: 1, explanation: "ブザーなどで知らせる「警報式」と、物理的に次の動作ができなくなる「規制式」があります。より確実なのは規制式です。" },
        { question: "工程内の品質を作り込むための考え方で「後工程はお客様」という言葉があります。この意味として最も適切なのは？", options: ["後工程の作業員には敬語を使わなければならない", "後工程に不良品を流さないよう、自分の工程で確実に品質を保証する", "後工程から文句を言われたら、すべて謝る", "お客様のふりをして後工程を監視する"], answer: 1, explanation: "次の作業を行う人を「お客様」だと考えれば、不良品や作業しにくい状態のものを渡すことはできない、という品質保証の基本精神です。" }
      ],
      'safety': [
        { question: "「1件の重大事故の背後には、29件の軽微な事故があり、さらにその背景には300件のヒヤリハットがある」という法則は？", options: ["マーフィーの法則", "ハインリッヒの法則", "パレートの法則", "ムーアの法則"], answer: 1, explanation: "ハインリッヒの法則です。重大事故を防ぐためには、日頃の「ヒヤリ・ハット」の段階で対策を打つことが重要です。" },
        { question: "作業前に、その作業に潜む危険を予想し、対策を話し合う活動「KYT」の『KY』とは何の略ですか？", options: ["危険予知", "工場休業", "確認良し", "環境要因"], answer: 0, explanation: "KYTは「危険（Kiken）予知（Yochi）トレーニング（Training）」の略です。作業開始前にイラストや現場を見ながら危険ポイントを洗い出します。" },
        { question: "作業の正確性を高めるため、対象物を指でさし、大きな声で状態を確認する行動を何と言いますか？", options: ["指差呼称（しさこしょう）", "安全確認", "目視点検", "声出し確認"], answer: 0, explanation: "「ヨシ！」と指をさして声を出す「指差呼称」は、意識レベルをクリアにし、ヒューマンエラーを大幅に減少させる効果があります。" },
        { question: "「安全第一」というスローガンに続く、本来の第2、第3の言葉はどれですか？", options: ["品質第二、生産第三", "納期第二、コスト第三", "健康第二、利益第三", "効率第二、品質第三"], answer: 0, explanation: "1900年代初頭のアメリカで「安全第一、品質第二、生産第三」という方針が打ち立てられました。安全を最優先にした結果、逆に品質も生産性も向上しました。" },
        { question: "ヒヤリハット報告を提出する最も重要な目的は何ですか？", options: ["ミスをした作業者を特定して評価を下げるため", "会社に事故の責任がないことを証明するため", "潜在的な危険を共有し、重大事故を未然に防ぐ対策を打つため", "安全衛生委員会のノルマを達成するため"], answer: 2, explanation: "ヒヤリハットは犯人探しではなく、現場に潜む危険を共有し、事故が起きる前に対策を打つ（未然防止）ためのものです。" },
        { question: "機械の点検や清掃を行う際、他人が誤って電源を入れてしまう事故を防ぐための手順を何と呼びますか？", options: ["KYT", "LOTO（ロックアウト・タグアウト）", "PDCA", "5S"], answer: 1, explanation: "ロックアウト（鍵をかける）とタグアウト（札をかける）により、機械の動力源を物理的に遮断し、「作業中につき操作禁止」を明確にする安全手順です。" },
        { question: "安全衛生における「保護具」の考え方として、最も適切なものはどれですか？", options: ["保護具をつけていれば、どんな危険な作業をしても絶対に安全である", "保護具は危険源そのものをなくすわけではなく、万が一の被害を軽減するための最後の砦である", "作業がしにくい場合は、個人の判断で保護具を外してもよい", "保護具は一度配布されたら、壊れるまで何年でも同じものを使い続けるべきだ"], answer: 1, explanation: "安全対策の基本は「危険源そのものをなくすこと」です。保護具はそれができない場合の補助的な防護手段であることを認識する必要があります。" },
        { question: "「5S」と「安全」の関係について、正しい説明はどれですか？", options: ["5Sは生産性を上げるためのものであり、安全とは無関係である", "整理・整頓ができていない現場は、つまずきや転倒などの労働災害が発生しやすい", "安全を優先すると5S活動をする時間がなくなるため、どちらか一方を選ばなければならない", "清掃だけやっていれば、安全は自然と確保される"], answer: 1, explanation: "通路に物が放置されていると転倒事故に繋がり、油がこぼれていると滑りやすくなります。5Sは、すべての安全衛生の基盤です。" },
        { question: "職場にある危険性や有害性を特定し、そのリスクの大きさを評価して対策を検討する一連の手順を何と呼びますか？", options: ["リスクアセスメント", "ヒヤリハット活動", "5S活動", "KY活動"], answer: 0, explanation: "リスクアセスメントは、労働災害を未然に防ぐための体系的な取り組みです。発生の「可能性」と「重篤度」を掛け合わせてリスクの大きさを評価します。" },
        { question: "重いものを持ち上げる際など、無理な姿勢や動作によって引き起こされる腰痛などの疾患を防ぐために重要なことは？", options: ["息を止めて一気に持ち上げる", "膝を伸ばしたまま前屈みで持ち上げる", "重心を低くし、対象物に体を近づけ、脚の力を使って持ち上げる", "腰をひねりながら持ち上げる"], answer: 2, explanation: "腰痛予防の基本です。荷物は体に密着させ、腰ではなく膝の屈伸（脚の力）を利用して持ち上げることが重要です。" },
        { question: "化学物質を取り扱う際、その危険性や有害性、安全な取り扱い方法などを記載した文書の略称は？", options: ["SDS", "ISO", "BOM", "SOP"], answer: 0, explanation: "SDS（Safety Data Sheet：安全データシート）です。化学物質の適切な管理と事故防止のために、提供が義務付けられています。" },
        { question: "機械の可動部など、人が触れると危険な部分を覆い隠すための物理的な防護設備を何と呼びますか？", options: ["インターロック", "安全カバー（ガード）", "非常停止ボタン", "ライトカーテン"], answer: 1, explanation: "安全カバーは、本質的安全化（危険源の除去）が困難な場合に、作業者と危険源を隔離する最も基本的な安全対策です。" },
        { question: "工場内でのフォークリフト作業における安全ルールとして「間違っている」ものは？", options: ["指差呼称で周囲の安全を確認する", "荷物で前が見えない時はバックで走行する", "急いでいる時は制限速度を超えてもよい", "爪（フォーク）を下げて走行する"], answer: 2, explanation: "工場内には必ず制限速度が設けられています。フォークリフトは死角が多く、重量もあるため、少しの速度超過が重大事故に直結します。" },
        { question: "熱中症を予防するための指標として用いられる「WBGT値」の別名は？", options: ["気温", "湿度", "暑さ指数", "不快指数"], answer: 2, explanation: "WBGT（暑さ指数）は、気温だけでなく湿度や輻射熱を取り入れた指標で、労働環境での熱中症予防の基準として使われます。" },
        { question: "保護具の中で、騒音レベルが高い職場で聴力障害を防ぐために着用するものは？", options: ["保護メガネ", "耳栓・イヤーマフ", "防塵マスク", "安全靴"], answer: 1, explanation: "騒音性難聴は徐々に進行するため自覚しにくく、一度失われた聴力は回復しません。そのため耳栓などの保護具着用が必須です。" },
        { question: "機械のカバーが開いていると機械が動かない、あるいは動いている時にカバーを開けると自動停止する安全装置を何と呼ぶ？", options: ["ポカヨケ", "インターロック", "アンドン", "ブレーカー"], answer: 1, explanation: "インターロック機構により、「人間の不注意」があっても機械的に危険な状態を回避する仕組みです。" },
        { question: "職場の安全や衛生状態を確認し、改善点を見つけるために定期的に現場を見回る活動は？", options: ["安全パトロール", "朝礼", "棚卸し", "工程内検査"], answer: 0, explanation: "安全管理者や委員が現場を巡回し、不安全な状態（危険箇所）や不安全な行動（ルール違反）がないかを確認し、改善を促す活動です。" },
        { question: "有機溶剤などの有害なガスが発生する作業場で、作業者の健康を守るために設置すべき設備は？", options: ["局所排気装置", "扇風機", "空気清浄機", "エアコン"], answer: 0, explanation: "有害なガスや粉塵を、作業者が吸い込む前に発生源の近くで吸い取って屋外へ排出する「局所排気装置」が有効です。" },
        { question: "作業場において、安全のために通路と作業エリアを明確に分ける目的で床に引かれる線を何と呼ぶ？", options: ["ストップライン", "区画線（白線・黄線）", "ガイドライン", "センターライン"], answer: 1, explanation: "区画線（安全線）を引くことで、フォークリフトと歩行者の接触事故を防いだり、物の置き場所を明確にしたりする効果があります。" },
        { question: "「感電」を防ぐための基本的な対策として、間違っているものは？", options: ["濡れた手で電気機器のスイッチに触れない", "漏電遮断器を設置する", "アース（接地）線を接続する", "コードが破れていたらビニールテープでぐるぐる巻きにして使い続ける"], answer: 3, explanation: "コードの被覆破れは漏電・感電・火災の大きな原因です。素人判断でテープ補修せず、安全管理者に報告して適切な修理・交換を行うべきです。" },
        { question: "高所作業において、墜落による労働災害を防ぐために着用が義務付けられている保護具は？", options: ["安全靴", "墜落制止用器具（安全帯・フルハーネス）", "防塵マスク", "保護メガネ"], answer: 1, explanation: "一定の高さ以上の場所では、万が一足を踏み外しても地面に落下しないよう、フルハーネス型の墜落制止用器具の着用が原則義務化されています。" },
        { question: "火災が発生した際、消火器を使う前に「一番最初」に行うべき行動は？", options: ["大声で「火事だ！」と周囲に知らせる", "窓をすべて開ける", "水を汲みに行く", "荷物をまとめる"], answer: 0, explanation: "火災発生時は、まず大声で周囲に知らせ、避難と初期消火の協力を求めることが鉄則です。一人で無理に消そうとすると逃げ遅れる危険があります。" }
      ],
      'maintenance': [
        { question: "設備保全において「機械が故障してから修理する」という考え方を何と呼びますか？", options: ["事後保全", "予防保全", "予知保全", "改良保全"], answer: 0, explanation: "故障が起きてから対応するのが事後保全（Breakdown Maintenance）です。予期せぬライン停止を引き起こすため、できるだけ減らすべきとされます。" },
        { question: "設備の故障を未然に防ぐため、定期的な点検や部品交換を行う保全手法は？", options: ["事後保全", "予防保全", "自主保全", "予知保全"], answer: 1, explanation: "車検のように、あらかじめ計画を立てて点検・交換を行うのが予防保全（Preventive Maintenance）です。" },
        { question: "設備の状態をセンサーなどで常に監視し、故障の兆候を捉えてからメンテナンスを行う手法は？", options: ["事後保全", "予防保全", "予知保全", "自主保全"], answer: 2, explanation: "予知保全（Predictive Maintenance）は、振動や温度などのデータを分析し、部品の寿命が尽きる直前に最適なタイミングで交換する高度な手法です。" },
        { question: "「自分の設備は自分で守る」というスローガンのもと、現場のオペレーター（作業者）自身が日常の点検や清掃、給油などを行う活動を何と呼びますか？", options: ["自主保全", "専門保全", "改良保全", "事後保全"], answer: 0, explanation: "現場で機械を一番よく知っている作業者が、清掃・給油・増し締めなどの日常的なメンテナンスを行うのが自主保全です。" },
        { question: "全社を挙げて生産設備の効率を極限まで高めるための活動「TPM」。この『P』は何の略？", options: ["Productive（生産的）", "Preventive（予防的）", "Predictive（予知的）", "Plan（計画）"], answer: 0, explanation: "TPMは「Total Productive Maintenance（全員参加の生産保全）」の略です。設備のロスをゼロにすることを目指します。" },
        { question: "TPM活動において、設備の効率を低下させる「設備の6大ロス」に含まれないものはどれですか？", options: ["故障ロス", "段取り・調整ロス", "チョコ停・空転ロス", "人件費ロス"], answer: 3, explanation: "設備の6大ロスは「故障、段取り・調整、刃具（立ち上がり）、チョコ停・空転、速度低下、不良・手直し」です。人件費は設備そのもののロスではありません。" },

      const [aiExplanation, setAiExplanation] = useState(null);
      const [isLoading, setIsLoading] = useState(false);

      const handleAskAI = async () => {
        setIsLoading(true);
        const result = await fetchGeminiExplanation(item.question, item.wrongOption, item.correctOption, item.explanation);
        setAiExplanation(result);
        setIsLoading(false);
      };

      return (
        <div className="bg-slate-900 p-5 rounded-xl border border-slate-700">
          <p className="font-bold text-slate-200 mb-4 leading-relaxed">Q. {item.question}</p>
          <div className="grid sm:grid-cols-2 gap-4 mb-4 text-sm">
            <div className="bg-red-900/20 border border-red-500/30 p-3 rounded-lg">
              <span className="block text-red-400 font-bold mb-1"><i className="fa-solid fa-xmark"></i> あなたの回答</span>
              <span className="text-slate-300">{item.wrongOption}</span>
            </div>
            <div className="bg-emerald-900/20 border border-emerald-500/30 p-3 rounded-lg">
              <span className="block text-emerald-400 font-bold mb-1"><i className="fa-solid fa-check"></i> 正解</span>
              <span className="text-slate-300">{item.correctOption}</span>
            </div>
          </div>
          <div className="bg-blue-900/20 p-4 rounded-lg border border-blue-500/30 mb-4">
            <p className="text-blue-300 font-bold mb-1 text-sm"><i className="fa-solid fa-lightbulb"></i> 解説</p>
            <p className="text-slate-300 text-sm leading-relaxed">{item.explanation}</p>
          </div>
          
          {!aiExplanation && !isLoading && (
            <button onClick={handleAskAI} className="w-full py-2.5 bg-purple-900/40 hover:bg-purple-800/60 border border-purple-500/40 text-purple-300 rounded-lg text-sm font-bold transition flex items-center justify-center gap-2">
              ✨ ベテランAI社員にもっと詳しく聞く
            </button>
          )}
          
          {isLoading && (
            <div className="w-full py-4 flex items-center justify-center gap-2 text-purple-400 text-sm font-bold">
              <i className="fa-solid fa-circle-notch fa-spin text-lg"></i> ベテランAI社員が解説を考えています...
            </div>
          )}
          
          {aiExplanation && (
            <div className="bg-purple-900/20 p-4 rounded-lg border border-purple-500/40 animate-fadeIn mt-4">
              <p className="text-purple-300 font-bold mb-3 text-sm flex items-center gap-2">
                <i className="fa-solid fa-robot text-lg"></i> ✨ ベテランAI社員の解説
              </p>
              <div className="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap">
                {aiExplanation}
              </div>
            </div>
          )}
        </div>
      );
    };

    const App = () => {
      const [view, setView] = useState('title');
      const [activeCategory, setActiveCategory] = useState(null);
      const [currentQuizList, setCurrentQuizList] = useState([]);
      const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      const [isAnswered, setIsAnswered] = useState(false);
      
      const [wrongAnswers, setWrongAnswers] = useState([]);
      
      // クイズデータとローディング状態
      const [quizData, setQuizData] = useState(DEFAULT_QUIZ_QUESTIONS);
      const [isLoadingData, setIsLoadingData] = useState(false);

      const [savedScores, setSavedScores] = useState(() => {
        try {
          const item = window.localStorage.getItem('maguex_quiz_scores_v3'); 
          return item ? JSON.parse(item) : {};
        } catch (error) {
          console.error(error);
          return {};
        }
      });

      // --- スプレッドシート読み込み処理 ---
      useEffect(() => {
        if (SPREADSHEET_CSV_URL && SPREADSHEET_CSV_URL.trim() !== "") {
          setIsLoadingData(true);
          Papa.parse(SPREADSHEET_CSV_URL, {
            download: true,
            header: true,
            complete: (results) => {
              const newData = { '5s': [], 'qc': [], 'safety': [], 'maintenance': [], 'plastic_magnet': [] };
              let isValidData = false;
              
              results.data.forEach(row => {
                const cat = row['カテゴリID'] ? row['カテゴリID'].trim() : '';
                if (cat && newData[cat] && row['問題']) {
                  newData[cat].push({
                    question: row['問題'],
                    options: [row['選択肢1'], row['選択肢2'], row['選択肢3'], row['選択肢4']].filter(Boolean),
                    answer: parseInt(row['正解番号']) - 1,
                    explanation: row['解説'] || ""
                  });
                  isValidData = true;
                }
              });

              if (isValidData) {
                setQuizData(newData);
                console.log("スプレッドシートから問題を読み込みました！");
              } else {
                console.warn("スプレッドシートの形式が正しくないか、データがありません。内蔵データを使用します。");
              }
              setIsLoadingData(false);
            },
            error: (err) => {
              console.error("スプレッドシートの読み込みエラー:", err);
              setIsLoadingData(false);
            }
          });
        }
      }, []);

      const saveScoreToLocal = (categoryId, newScore) => {
        try {
          const updatedScores = { ...savedScores, [categoryId]: newScore };
          setSavedScores(updatedScores);
          window.localStorage.setItem('maguex_quiz_scores_v3', JSON.stringify(updatedScores));
        } catch (error) {
          console.error("保存に失敗しました", error);
        }
      };

      const startQuiz = (categoryId) => {
        setActiveCategory(categoryId);
        let shuffledQuestions = [];

        if (categoryId === 'comprehensive') {
          const allQuestions = Object.values(quizData).flat();
          shuffledQuestions = shuffleArray(allQuestions).slice(0, COMPREHENSIVE_QUESTIONS_COUNT);
        } else {
          shuffledQuestions = shuffleArray(quizData[categoryId]).slice(0, NORMAL_QUESTIONS_COUNT);
        }

        if (shuffledQuestions.length === 0) {
           alert("このカテゴリにはまだ問題が登録されていません。");
           return;
        }

        setCurrentQuizList(shuffledQuestions);
        setCurrentQuestionIndex(0);
        setScore(0);
        setSelectedOption(null);
        setIsAnswered(false);
        setWrongAnswers([]);
        setView('quiz');
        window.scrollTo(0,0);
      };

      const goHome = () => {
        setView('title');
        setActiveCategory(null);
        setCurrentQuizList([]);
        setWrongAnswers([]);
        window.scrollTo(0,0);
      };

      const handleAnswer = (index) => {
        if (isAnswered) return;
        setSelectedOption(index);
        setIsAnswered(true);
        
        const currentQ = currentQuizList[currentQuestionIndex];
        if (index === currentQ.answer) {
          setScore(score + 1);
        } else {
          setWrongAnswers(prev => [...prev, {
            question: currentQ.question,
            correctOption: currentQ.options[currentQ.answer],
            wrongOption: currentQ.options[index],
            explanation: currentQ.explanation
          }]);
        }
      };

      const nextQuestion = () => {
        if (currentQuestionIndex + 1 < currentQuizList.length) {
          setCurrentQuestionIndex(currentQuestionIndex + 1);
          setSelectedOption(null);
          setIsAnswered(false);
          window.scrollTo(0,0);
        } else {
          // ★修正：スコアはすでに加算されているため、そのまま保存します
          saveScoreToLocal(activeCategory, score);
          setView('result');
          window.scrollTo(0,0);
        }
      };

      const TitleScreen = () => {
        const specialCategory = QUIZ_CATEGORIES.find(c => c.isSpecial);
        const normalCategories = QUIZ_CATEGORIES.filter(c => !c.isSpecial);

        return (
          <div className="max-w-5xl mx-auto py-12 px-4 animate-fadeIn">
            <div className="text-center mb-10 sm:mb-14">
              <div className="inline-flex items-center justify-center p-4 sm:p-5 bg-blue-600 rounded-2xl mb-4 sm:mb-6 shadow-lg shadow-blue-900/50">
                <i className="fa-solid fa-book-open text-3xl sm:text-4xl text-white"></i>
              </div>
              <h1 className="text-2xl sm:text-4xl md:text-5xl font-extrabold text-white mb-4 tracking-tight leading-snug">
                <span className="text-blue-400 block mb-1 text-xl sm:text-2xl md:text-3xl">マグエックス</span>
                生産に関する基礎知識クイズ
              </h1>
              <p className="text-sm sm:text-base md:text-lg text-slate-400 mt-6">
                現場で必須となる基礎知識をテストします。<br className="hidden md:block" />
                満点を目指して<span className="text-yellow-400 font-bold">「生産部マイスター」</span>の称号を手に入れよう！
              </p>
            </div>

            {isLoadingData ? (
              <div className="text-center py-16">
                <i className="fa-solid fa-cloud-arrow-down fa-bounce text-5xl text-blue-500 mb-6"></i>
                <p className="text-lg text-slate-300 font-bold animate-pulse">スプレッドシートから最新の問題を読み込み中...</p>
              </div>
            ) : (
              <>
                {/* 総合テスト（特別枠） */}
                <div className="mb-8">
                  <button onClick={() => startQuiz(specialCategory.id)} className={`w-full bg-slate-800 border-2 border-yellow-500/50 hover:border-yellow-400 rounded-2xl p-6 sm:p-8 text-left transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:shadow-yellow-900/40 group relative overflow-hidden flex flex-col sm:flex-row items-center gap-6`}>
                    <div className={`absolute top-0 right-0 w-48 h-48 bg-yellow-500/10 rounded-bl-full -mr-16 -mt-16 transition-transform group-hover:scale-110`}></div>
                    <div className="relative z-10 w-20 h-20 bg-slate-900 rounded-2xl flex items-center justify-center border border-yellow-500/30 flex-shrink-0 group-hover:border-yellow-400 transition-colors shadow-[0_0_15px_rgba(234,179,8,0.2)]">
                      {specialCategory.icon}
                    </div>
                    <div className="relative z-10 flex-1 text-center sm:text-left">
                      <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-2 gap-2">
                        <h2 className="text-2xl sm:text-3xl font-bold text-white">{specialCategory.name}</h2>
                        {savedScores[specialCategory.id] !== undefined && (
                          <div className="bg-slate-900 px-4 py-1.5 rounded-full border border-yellow-500/30 text-sm font-semibold inline-block mx-auto sm:mx-0">
                            <span className="text-slate-400">前回: </span>
                            <span className={savedScores[specialCategory.id] >= 16 ? "text-yellow-400" : "text-amber-400"}>{savedScores[specialCategory.id]} / {COMPREHENSIVE_QUESTIONS_COUNT}問</span>
                          </div>
                        )}
                      </div>
                      <p className="text-sm sm:text-base text-slate-300 leading-relaxed mb-4">{specialCategory.description}</p>
                      <div className={`inline-flex items-center text-yellow-400 font-bold text-base bg-yellow-500/10 px-4 py-2 rounded-lg`}>
                        全20問のテストを開始する <i className="fa-solid fa-chevron-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                      </div>
                    </div>
                  </button>
                </div>

                {/* 通常カテゴリ（グリッド） */}
                <div className="grid md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-2 gap-6">
                  {normalCategories.map((category) => {
                    const previousScore = savedScores[category.id];
                    const qCount = quizData[category.id] ? quizData[category.id].length : 0;
                    const targetCount = Math.min(qCount, NORMAL_QUESTIONS_COUNT);

                    return (
                      <button key={category.id} onClick={() => startQuiz(category.id)} className={`bg-slate-800 border-2 border-slate-700 ${category.theme.borderHover} rounded-2xl p-6 text-left transition-all duration-300 hover:-translate-y-1 hover:shadow-xl ${category.theme.shadowHover} group relative overflow-hidden flex flex-col justify-between h-full ${qCount === 0 ? 'opacity-50 cursor-not-allowed' : ''}`} disabled={qCount === 0}>
                        <div>
                          <div className={`absolute top-0 right-0 w-32 h-32 ${category.theme.bgLight} rounded-bl-full -mr-10 -mt-10 transition-transform group-hover:scale-110`}></div>
                          <div className="relative z-10">
                            <div className="flex justify-between items-start mb-4">
                              <div className={`w-14 h-14 bg-slate-900 rounded-xl flex items-center justify-center border border-slate-700 ${category.theme.borderGroupHover} transition-colors`}>{category.icon}</div>
                              {previousScore !== undefined && qCount > 0 && (
                                <div className="bg-slate-900 px-3 py-1 rounded-full border border-slate-700 text-xs font-semibold">
                                  <span className="text-slate-400">前回: </span>
                                  <span className={previousScore >= (targetCount * 0.8) ? "text-emerald-400" : "text-amber-400"}>{previousScore} / {targetCount}問</span>
                                </div>
                              )}
                            </div>
                            <h2 className="text-xl font-bold text-white mb-2">{category.name}</h2>
                            <p className="text-sm text-slate-400 leading-relaxed mb-6">{category.description}</p>
                          </div>
                        </div>
                        <div className={`relative z-10 flex items-center ${category.theme.text} font-semibold text-sm mt-auto`}>
                          {qCount > 0 ? `${targetCount}問テストを開始 ` : '問題がありません '}
                          <i className="fa-solid fa-chevron-right ml-1 group-hover:translate-x-1 transition-transform"></i>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        );
      };

      const QuizScreen = () => {
        const categoryInfo = QUIZ_CATEGORIES.find(c => c.id === activeCategory);
        const q = currentQuizList[currentQuestionIndex];
        const progressPercent = ((currentQuestionIndex) / currentQuizList.length) * 100;

        return (
          <div className="max-w-3xl mx-auto py-8 px-4 animate-fadeIn">
            <div className="flex items-center justify-between mb-8">
              <button onClick={goHome} className="text-slate-400 hover:text-white flex items-center gap-2 transition">
                <i className="fa-solid fa-house"></i> <span className="hidden sm:inline">ホームに戻る</span>
              </button>
              <div className="flex flex-col items-end">
                <span className={`text-sm font-bold ${categoryInfo.theme.text} mb-1`}>{categoryInfo.name}</span>
                <div className="text-slate-300 font-medium">問題 {currentQuestionIndex + 1} <span className="text-slate-500">/ {currentQuizList.length}</span></div>
              </div>
            </div>
            <div className="w-full bg-slate-800 rounded-full h-2 mb-8 overflow-hidden">
              <div className={`${categoryInfo.theme.bgProgress} h-2 transition-all duration-500 ease-out`} style={{ width: `${progressPercent}%` }}></div>
            </div>
            <div className="bg-slate-800 border border-slate-700 rounded-2xl p-6 sm:p-10 shadow-xl relative overflow-hidden">
              <h2 className="text-lg sm:text-xl md:text-2xl font-bold text-white mb-8 leading-relaxed">{q.question}</h2>
              <div className="space-y-4">
                {q.options.map((option, index) => {
                  let btnStyle = "w-full text-left p-4 sm:p-5 rounded-xl border-2 transition-all duration-200 flex items-center gap-4 ";
                  let numStyle = "w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm flex-shrink-0 transition-colors ";
                  if (!isAnswered) { btnStyle += `bg-slate-900 border-slate-700 ${categoryInfo.theme.borderHover} hover:bg-slate-800 cursor-pointer`; numStyle += "bg-slate-800 text-slate-400"; }
                  else if (index === q.answer) { btnStyle += "bg-emerald-900/30 border-emerald-500 text-white shadow-[0_0_15px_rgba(16,185,129,0.2)]"; numStyle += "bg-emerald-500 text-white"; }
                  else if (index === selectedOption) { btnStyle += "bg-red-900/30 border-red-500/50 text-slate-300"; numStyle += "bg-red-500/50 text-white"; }
                  else { btnStyle += "bg-slate-900 border-slate-800 opacity-40 cursor-default"; numStyle += "bg-slate-800 text-slate-600"; }
                  return (
                    <button key={index} onClick={() => handleAnswer(index)} disabled={isAnswered} className={btnStyle}>
                      <span className={numStyle}>{index + 1}</span><span className="text-sm sm:text-base leading-relaxed">{option}</span>
                    </button>
                  );
                })}
              </div>
              {isAnswered && (
                <div className="mt-8 pt-8 border-t border-slate-700 animate-fadeIn">
                  <div className="flex items-start gap-4 bg-slate-900/50 rounded-xl p-4 sm:p-5 border border-slate-700">
                    <div className={`${selectedOption === q.answer ? 'bg-emerald-500/20' : 'bg-red-500/20'} p-2 rounded-full flex-shrink-0`}>
                      <i className={`fa-solid ${selectedOption === q.answer ? 'fa-check-circle text-emerald-400' : 'fa-circle-exclamation text-red-400'} text-xl sm:text-2xl`}></i>
                    </div>
                    <div className="flex-1">
                      <h3 className={`text-base sm:text-lg font-bold mb-2 ${selectedOption === q.answer ? 'text-emerald-400' : 'text-red-400'}`}>{selectedOption === q.answer ? '正解！' : '不正解...'}</h3>
                      <p className="text-slate-300 leading-relaxed text-sm sm:text-base">{q.explanation}</p>
                    </div>
                  </div>
                  <div className="mt-8 flex justify-end">
                    <button onClick={nextQuestion} className={`${categoryInfo.theme.bgBtn} ${categoryInfo.theme.bgBtnHover} text-white px-6 sm:px-8 py-3 rounded-xl font-bold transition flex items-center gap-2 shadow-lg text-sm sm:text-base`}>
                      {currentQuestionIndex + 1 < currentQuizList.length ? '次の問題へ' : '結果を見る'} <i className="fa-solid fa-chevron-right"></i>
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      const ResultScreen = () => {
        const [isCopied, setIsCopied] = useState(false);
        const categoryInfo = QUIZ_CATEGORIES.find(c => c.id === activeCategory);
        const percentage = Math.round((score / currentQuizList.length) * 100);
        
        const rankInfo = getRankInfo(percentage);

        const handleCopyReport = () => {
          const reportText = `『マグエックス 生産に関する基礎知識クイズ』\n【${categoryInfo.name}】に挑戦しました！\n結果：${score} / ${currentQuizList.length}問正解 (${percentage}%)\nランク：${rankInfo.rank}（${rankInfo.title}）`;
          
          const textArea = document.createElement("textarea");
          textArea.value = reportText;
          document.body.appendChild(textArea);
          textArea.select();
          try {
            document.execCommand('copy');
            setIsCopied(true);
            setTimeout(() => setIsCopied(false), 2000);
          } catch (err) {
            console.error('コピーに失敗しました', err);
          }
          document.body.removeChild(textArea);
        };

        return (
          <div className="max-w-3xl mx-auto py-12 px-4 animate-fadeIn pb-24">
            <div className="bg-slate-800 border border-slate-700 rounded-3xl p-8 sm:p-10 shadow-2xl relative overflow-hidden text-center mb-8">
              {percentage === 100 && <div className="absolute top-0 left-0 w-full h-full bg-yellow-500/10 animate-pulse pointer-events-none"></div>}
              
              <div className="mb-2">
                <span className={`inline-block px-4 py-1 rounded-full text-sm font-bold border ${rankInfo.border} ${rankInfo.bg} ${rankInfo.color} mb-4`}>
                  ランク {rankInfo.rank}
                </span>
              </div>
              <div className={`text-6xl sm:text-7xl mb-6 ${rankInfo.color} animate-popIn`} style={{ textShadow: percentage === 100 ? '0 0 20px rgba(250,204,21,0.5)' : 'none' }}>
                <i className={`fa-solid ${rankInfo.icon}`}></i>
              </div>
              <p className="text-sm text-slate-400 mb-1">獲得称号</p>
              <h2 className={`text-3xl sm:text-4xl font-extrabold mb-8 ${rankInfo.color}`}>{rankInfo.title}</h2>
              
              <div className="flex flex-wrap justify-center items-center gap-4 mb-8">
                <div className="bg-slate-900 rounded-2xl p-6 border border-slate-700 min-w-[120px] sm:min-w-[140px] flex-1 sm:flex-none">
                  <p className="text-xs sm:text-sm text-slate-400 mb-1">正解数</p>
                  <p className="text-3xl sm:text-4xl font-bold text-white">{score} <span className="text-base sm:text-xl text-slate-500">/ {currentQuizList.length}</span></p>
                </div>
                <div className="bg-slate-900 rounded-2xl p-6 border border-slate-700 min-w-[120px] sm:min-w-[140px] flex-1 sm:flex-none">
                  <p className="text-xs sm:text-sm text-slate-400 mb-1">正答率</p>
                  <p className={`text-3xl sm:text-4xl font-bold ${rankInfo.color}`}>{percentage}<span className="text-base sm:text-xl">%</span></p>
                </div>
              </div>
              <p className="text-sm sm:text-base text-slate-300 leading-relaxed mb-10 max-w-md mx-auto">
                {percentage === 100 ? "完璧な成績です！この知識を現場で存分に活かしてください。" :
                 percentage >= 80 ? "素晴らしい成績です！間違えた箇所を復習し、完全マスターを目指しましょう。" :
                 percentage >= 60 ? "基礎はできています。解説を読んで、さらに知識を深めましょう。" :
                 "まずは基礎固めからです！もう一度チャレンジして用語に慣れていきましょう。"}
              </p>

              <div className="mb-10">
                <button 
                  onClick={handleCopyReport} 
                  className={`px-8 py-3 rounded-xl font-bold transition flex items-center justify-center gap-2 mx-auto w-full sm:w-auto ${
                    isCopied ? 'bg-emerald-600 hover:bg-emerald-500 text-white' : 'bg-slate-700 hover:bg-slate-600 text-slate-200 border border-slate-600'
                  }`}
                >
                  {isCopied ? (
                    <><i className="fa-solid fa-check"></i> コピーしました！</>
                  ) : (
                    <><i className="fa-solid fa-paste"></i> 結果をコピーして報告</>
                  )}
                </button>
                <p className="text-xs text-slate-500 mt-2">Slackに貼り付けて結果を報告できます</p>
              </div>

              <div className="flex flex-col sm:flex-row gap-4 justify-center">
                <button onClick={() => startQuiz(activeCategory)} className="flex items-center justify-center gap-2 bg-slate-700 hover:bg-slate-600 text-white px-6 sm:px-8 py-3 sm:py-4 rounded-xl font-bold transition text-sm sm:text-base">
                  <i className="fa-solid fa-rotate-right"></i> 同じテストをやり直す
                </button>
                <button onClick={goHome} className="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-6 sm:px-8 py-3 sm:py-4 rounded-xl font-bold transition shadow-lg shadow-blue-900/50 text-sm sm:text-base">
                  <i className="fa-solid fa-house"></i> トップに戻る
                </button>
              </div>
            </div>

            {wrongAnswers.length > 0 && (
              <div className="bg-slate-800 border border-slate-700 rounded-2xl p-6 sm:p-8 shadow-xl">
                <h3 className="text-xl font-bold text-white mb-6 flex items-center gap-2 border-b border-slate-700 pb-4">
                  <i className="fa-solid fa-book-medical text-amber-400"></i> 間違えた問題の復習 ({wrongAnswers.length}問)
                </h3>
                <div className="space-y-6">
                  {wrongAnswers.map((item, idx) => (
                    <WrongAnswerItem key={idx} item={item} />
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      };

      return <div>{view === 'title' && <TitleScreen />}{view === 'quiz' && <QuizScreen />}{view === 'result' && <ResultScreen />}</div>;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
